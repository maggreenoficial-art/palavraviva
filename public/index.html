    <style id="expo-reset">
      html,
      body {
        height: 100%;
        height: 100dvh;
        margin: 0;
        background-color: #121a21;
      }
      body {
        overflow: hidden;
        -webkit-text-size-adjust: 100%;

        display: flex;

        height: 100%;
        height: 100dvh;

        overflow: hidden;

      @media (min-width: 520px) {

              900px 420px at 50% -10%,

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => undefined);
        });
      }
    </script>
    <!-- Meta Parameter Builder (fbc/fbp) — captura fbclid cedo para CAPI -->
    <script src="https://unpkg.com/meta-capi-param-builder-clientjs@1.3.1/dist/clientParamBuilder.bundle.js"></script>
    <script>
      (function () {
        function cookieDomain() {
          var host = location.hostname || '';
          if (host === 'localhost' || /^\d+\.\d+\.\d+\.\d+$/.test(host)) return '';
          var parts = host.split('.');
          if (parts.length >= 2) return ';domain=.' + parts.slice(-2).join('.');
          return '';
        }
        function readCookie(name) {
          var m = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
          return m ? decodeURIComponent(m[1]) : '';
        }
        function writeCookie(name, value, days) {
          if (!value) return;
          var maxAge = Math.floor((days || 90) * 24 * 60 * 60);
          document.cookie =
            name +
            '=' +
            encodeURIComponent(value) +
            ';path=/' +
            cookieDomain() +
            ';max-age=' +
            maxAge +
            ';SameSite=Lax';
        }
        function subdomainIndex() {
          var host = location.hostname || '';
          if (!host || host === 'localhost') return 1;
          return host.split('.').length >= 3 ? 2 : 1;
        }
        function ensureFbp() {
          var existing = readCookie('_fbp');
          if (existing && existing.indexOf('fb.') === 0) return existing;
          var value =
            'fb.' + subdomainIndex() + '.' + Date.now() + '.' + Math.floor(Math.random() * 1e10);
          writeCookie('_fbp', value, 90);
          return value;
        }
        function ensureFbcFromFbclid() {
          try {
            var params = new URLSearchParams(location.search);
            var fbclid = params.get('fbclid');
            if (!fbclid) return readCookie('_fbc') || '';
            var existing = readCookie('_fbc');
            var existingClick = existing ? existing.split('.').slice(3).join('.') : '';
            if (existing && existingClick === fbclid) return existing;
            var value = 'fb.' + subdomainIndex() + '.' + Date.now() + '.' + fbclid;
            writeCookie('_fbc', value, 90);
            try {
              sessionStorage.setItem('meta_fbc', value);
              sessionStorage.setItem('meta_fbclid', fbclid);
            } catch (e) {}
            return value;
          } catch (e) {
            return readCookie('_fbc') || '';
          }
        }
        ensureFbp();
        ensureFbcFromFbclid();
        try {
          if (window.clientParamBuilder && window.clientParamBuilder.processAndCollectAllParams) {
            window.clientParamBuilder
              .processAndCollectAllParams(location.href)
              .then(function () {
                ensureFbp();
                ensureFbcFromFbclid();
              })
              .catch(function () {});
          }
        } catch (e) {}
      })();
    </script>
    <!-- Meta: produção = só CAPI. Com ?test_event_code= também carrega Pixel (aba Eventos de teste). -->
    <script>
      (function () {
        var code = '';
        try {
          var params = new URLSearchParams(location.search);
          if (
            params.get('clear_test_event') === '1' ||
            params.get('clearTestEvent') === '1'
          ) {
            try {
              sessionStorage.removeItem('meta_test_event_code');
              localStorage.removeItem('meta_test_event_code');
            } catch (e) {}
          }
          code =
            params.get('test_event_code') || params.get('testEventCode') || '';
          code = (code && code.trim()) || '';
          if (!code) {
            try {
              code = (sessionStorage.getItem('meta_test_event_code') || '').trim();
            } catch (e) {}
          }
          if (code) {
            sessionStorage.setItem('meta_test_event_code', code);
            try {
              localStorage.removeItem('meta_test_event_code');
            } catch (e) {}
          }
        } catch (e) {}

        // CAPI PageView (sempre) — origem Servidor
        try {
          var eid =
            'PageView_boot_' +
            Date.now().toString(36) +
            '_' +
            Math.random().toString(36).slice(2, 8);
          var body = {
            eventName: 'PageView',
            eventId: code ? eid + '_srv' : eid,
            eventSourceUrl: location.href,
            userAgent: navigator.userAgent,
            country: 'br',
          };
          if (code) body.testEventCode = code;
          try {
            var fbpMatch = document.cookie.match(/(?:^|; )_fbp=([^;]*)/);
            if (fbpMatch) body.fbp = decodeURIComponent(fbpMatch[1]);
          } catch (e) {}
          fetch('/api/meta/capi', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            keepalive: true,
            body: JSON.stringify(body),
          })
            .then(function (r) {
              return r.json().then(function (j) {
                if (code) {
                  console.info('[meta] boot PageView CAPI', {
                    testCode: code,
                    ok: j && j.ok,
                    events_received: j && j.meta && j.meta.events_received,
                  });
                }
              });
            })
            .catch(function () {});
        } catch (e) {}

        // Pixel só no modo teste (Eventos de teste da Meta)
        if (!code) return;
        !(function (f, b, e, v, n, t, s) {
          if (f.fbq) return;
          n = f.fbq = function () {
            n.callMethod
              ? n.callMethod.apply(n, arguments)
              : n.queue.push(arguments);
          };
          if (!f._fbq) f._fbq = n;
          n.push = n;
          n.loaded = !0;
          n.version = '2.0';
          n.queue = [];
          t = b.createElement(e);
          t.async = !0;
          t.src = v;
          s = b.getElementsByTagName(e)[0];
          s.parentNode.insertBefore(t, s);
        })(
          window,
          document,
          'script',
          'https://connect.facebook.net/en_US/fbevents.js',
        );
        fbq('init', '4474411989514975');
        fbq('set', 'test_event_code', code);
        fbq('track', 'PageView');
      })();
    </script>
  </head>
  <body>
    <noscript>Ative o JavaScript para usar o Palavra Viva.</noscript>
    <div id="root"></div>
  </body>
</html>
